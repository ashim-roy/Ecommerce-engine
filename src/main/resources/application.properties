spring.application.name= ProductService

logging.level.org.springframework.web=TRACE


#DB connection
# create if you creating schema from scretch
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/productservice
spring.datasource.username=productService26User
#spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
#show the SQL queries in the logs yu can set it false also

# if you want to keep existing data) Tell Flyway: "Treat the current database as the starting point."
spring.flyway.baseline-on-migrate=true

# Temporarily disable Flyway
#spring.flyway.enabled=false


# Server
server.port=9000

# Logging
logging.level.org.springframework.security=TRACE

# Spring Security User
spring.security.user.name=user
spring.security.user.password=password

